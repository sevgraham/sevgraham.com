<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Photography by Sev Graham." />
  <title>Photography — Sev Graham</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="profile-frame">
      <img src="profile.jpg" alt="Sev Graham profile picture" />
    </div>
    <h1>Sev Graham</h1>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="resume.html">Resume</a>
    <a href="publications.html">Publications</a>
    <a href="photography.html" aria-current="page">Photography</a>
    <a href="projects.html">Personal Projects</a>
    <a href="about.html">About</a>
  </nav>

  <main>
    <section>
      <h2>Photography</h2>
      <div class="photo-gallery">
        <img src="photos/photo1.jpg" alt="Photo 1" class="gallery-img" />
        <img src="photos/photo2.jpg" alt="Photo 2" class="gallery-img" />
        <img src="photos/photo3.jpg" alt="Photo 3" class="gallery-img" />
        <img src="photos/photo4.jpg" alt="Photo 4" class="gallery-img" />
        <img src="photos/photo5.jpg" alt="Photo 5" class="gallery-img" />
        <img src="photos/photo6.jpg" alt="Photo 6" class="gallery-img" />
      </div>
      <div id="modal">
        <img id="modal-img" src="" alt="Enlarged photo" />
      </div>
      <script>
        document.querySelectorAll('.gallery-img').forEach(img => {
          img.addEventListener('click', function() {
            document.getElementById('modal-img').src = this.src;
            document.getElementById('modal').style.display = 'flex';
          });
        });
        document.getElementById('modal').addEventListener('click', function(e) {
          if (e.target === this) {
            this.style.display = 'none';
            document.getElementById('modal-img').src = '';
          }
        });
      </script>
    </section>
  </main>

  <footer>
    &copy; 2025 Sev Graham. All rights reserved.
  </footer>
</body>
</html>
